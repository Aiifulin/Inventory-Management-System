<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <script>
        if (!sessionStorage.getItem("user_session")) {
            window.location.replace("Login.html");
        }
    </script>
    
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add New Product</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="components(css)/Theme.css">
    <link rel="stylesheet" href="components(css)/Add_Product.css" />
    
    <script type="module" src="components(js)/Route_Guard.js"></script>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h2>Inventory MS</h2>
                <span class="user-role" id="userRoleDisplay">Loading...</span>
            </div>

            <nav class="sidebar-nav">
                <a href="Dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i>Dashboard</a>
                <a href="Products.html" class="nav-link active"><i class="fas fa-box"></i>Products</a>
                <a href="#Placeholder" class="nav-link"><i class="fas fa-list"></i>Categories</a>
                <a href="#Placeholder" class="nav-link"><i class="fas fa-history"></i>Activity Log</a>
                <a href="#Placeholder" class="nav-link"><i class="fas fa-file-alt"></i>Reports</a>
                <a href="#Placeholder" class="nav-link"><i class="fas fa-archive"></i>Archived</a>
                <a href="Settings.html" class="nav-link"><i class="fas fa-gear"></i>Settings</a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" onclick="logout()" class="logout" id="logoutBtn">
                    <i class="fas fa-arrow-right-from-bracket"></i>Logout
                </a>
            </div>
        </div>
    </aside>

    <main class="main-content">
        
        <div class="page-header">
            <a href="Dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div class="header-title">
                <h1>Add New Product</h1>
                <p>Fill in the details to add a new product</p>
            </div>
        </div>

        <form action="#" method="POST">
            
            <div class="form-section">
                <h3 class="section-title">Basic Information</h3>
                
                <div class="basic-info-grid">
                    <div class="image-upload-box" onclick="document.getElementById('fileInput').click()">
                        <input type="file" id="fileInput" accept="image/*" style="display: none;">
                                            
                        <div id="uploadPlaceholder" style="text-align: center;">
                            <i class="fas fa-cloud-upload-alt" style="font-size: 24px; margin-bottom: 8px; color: var(--text-secondary);"></i>
                            <span style="display: block; font-size: 13px; font-weight: 500; color: var(--text-main);">Click to Upload Image</span>
                        </div>
                    
                        <img id="imagePreview" src="" alt="Preview" style="display: none; width: 100%; height: 100%; object-fit: contain; border-radius: 6px;">
                    </div>

                    <div class="basic-inputs">
                        <div class="input-group">
                            <label>Product Name *</label>
                            <input type="text" placeholder="Enter product name" required>
                        </div>
                        
                        <div class="input-group">
                            <label>Description</label>
                            <textarea placeholder="Enter product description"></textarea>
                        </div>

                        <div class="input-group">
                            <label>Category *</label>
                            <select required>
                                <option value="" disabled selected>Select a category</option>
                                <option value="Kitchenware">Kitchenware</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Furniture">Furniture</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3 class="section-title">Pricing & Stock</h3>
                <div class="pricing-grid">
                    <div class="input-group">
                        <label>Price *</label>
                        <input type="number" placeholder="0.00" step="0.01" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Stock Quantity *</label>
                        <input type="number" placeholder="0" required>
                    </div>
                
                    <div class="input-group">
                        <label>Low Stock Threshold *</label>
                        <input type="number" placeholder="10" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3 class="section-title">Product Variations</h3>
            
                <div class="grid-headers" style="display: flex; gap: 15px; margin-bottom: 5px; padding-right: 42px;">
                    <label style="flex: 1; font-size: 13px; font-weight: 600; color: var(--text-secondary);">Size *</label>
                    <label style="flex: 1; font-size: 13px; font-weight: 600; color: var(--text-secondary);">Color *</label>
                    <label style="flex: 1; font-size: 13px; font-weight: 600; color: var(--text-secondary);">Custom</label>
                </div>

                <div id="variation-container">
                    <div class="variations-row">
                        <div class="input-group">
                            <input type="text" class="var-size" placeholder="Ex: Large" required>
                        </div>
                        <div class="input-group">
                            <input type="text" class="var-color" placeholder="Ex: Red" required>
                        </div>
                        <div class="input-group">
                            <input type="text" class="var-custom" placeholder="Optional">
                        </div>
                        <button type="button" class="btn-delete remove-row-btn" title="Remove">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>

                <button type="button" class="btn-finaladd" id="add-main-variation-btn">
                    <i class="fas fa-plus"></i> Add Another Variation
                </button>
            </div>

            <div class="form-section">
                <h3 class="section-title">Custom Attributes</h3>
            
                <div style="display: flex; gap: 15px; margin-bottom: 5px;">
                    <label style="flex: 1; font-size: 13px; font-weight: 600; color: var(--text-secondary);">Attribute Name</label>
                    <label style="flex: 1; font-size: 13px; font-weight: 600; color: var(--text-secondary);">Value</label>
                    <div style="width: 42px;"></div> </div>

                <div id="custom-attributes-container">
                    <div class="custom-attr-row">
                        <div class="input-group">
                            <input type="text" class="attr-name" placeholder="Ex: Material">
                        </div>
                        <div class="input-group">
                            <input type="text" class="attr-value" placeholder="Ex: Cotton">
                        </div>
                        <button type="button" class="btn-delete remove-attr-btn" title="Remove">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            
                <button type="button" class="btn-finaladd" id="add-custom-attr-main-btn">
                    <i class="fas fa-plus"></i> Add Custom Attribute
                </button>
            </div>

            <div class="form-actions">
                <a href="Dashboard.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Add Product</button>
            </div>

        </form>

    </main>

    <script type="module" src="components(js)/Add_Product.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const roleDisplay = document.getElementById("userRoleDisplay");
            const sessionData = sessionStorage.getItem("user_session");
            
            if (sessionData && roleDisplay) {
                try {
                    const user = JSON.parse(sessionData);
                    roleDisplay.textContent = user.role || user.username || "Loading...";
                } catch (error) {
                    console.error("Error parsing user session:", error);
                    roleDisplay.textContent = "Loading...";
                }
            }
        });
    </script>

</body>
</html>
