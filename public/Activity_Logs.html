<!DOCTYPE html>
<html lang="en">
<head>

<style>
    .main-content { visibility: hidden; }
</style>

<meta charset="UTF-8">
<title>Activity Logs</title>

<script>
    if (!localStorage.getItem("user_session")) {
        window.location.replace("index.html");
    }
</script>

<script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/theme.css" />
<link rel="stylesheet" href="css/Activity_Logs.css" />

</head>
<body>

<button class="hamburger" id="hamburgerBtn">
    <i class="fas fa-bars"></i>
</button>

<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-content">
        <div class="sidebar-header">
            <h2>Inventory MS</h2>
            <span class="user-name" id="userNameDisplay">Loading...</span>
            <button class="close-btn" id="closeBtn">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <nav class="sidebar-nav">
            <a href="Dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i>Dashboard</a>
            <a href="Products.html" class="nav-link"><i class="fas fa-box"></i>Products</a>
            <a href="Categories.html" class="nav-link"><i class="fas fa-list"></i>Categories</a>
            <a href="Stock_Transactions.html" class="nav-link"><i class="fas fa-truck"></i>Stock Transactions</a>
            <a href="Activity_Logs.html" class="nav-link active"><i class="fas fa-history"></i>Activity Log</a>
            <a href="Reports.html" class="nav-link"><i class="fas fa-file-alt"></i>Reports</a>
            <a href="Archives.html" class="nav-link"><i class="fas fa-archive"></i>Archived</a>
            <a href="Settings.html" class="nav-link"><i class="fas fa-gear"></i>Settings</a>
        </nav>

        <div class="sidebar-footer">
            <a href="#" onclick="logout()" class="logout">
                <i class="fas fa-arrow-right-from-bracket"></i>Logout
            </a>
        </div>
    </div>
</aside>

<main class="main-content">
    <div class="page-header">
        <div class="page-header-text">
            <h1>Activity Logs</h1>
            <p>Track all system activities</p>
        </div>
        <button class="btn-refresh-logs" id="refreshLogsBtn" title="Refresh Logs">
            <i class="fas fa-rotate-right" id="refreshLogsIcon"></i>
            <span>Refresh</span>
        </button>
    </div>

    <div class="logs-toolbar">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="logSearch" placeholder="Search by action, product, user, or date...">
        </div>
        <span class="logs-total-label" id="logsTotalLabel"></span>
    </div>

    <div class="table-wrapper hidden" id="logsTableWrapper">
        <table>
            <thead>
                <tr>
                    <th id="dateHeader" style="cursor:pointer;">
                        Date <i class="fas fa-sort" id="sortIcon"></i>
                    </th>
                    <th>Action</th>
                    <th>Product</th>
                    <th>Admin</th>
                </tr>
            </thead>
            <tbody id="logTable"></tbody>
        </table>
    </div>

    <div class="logs-skeleton visible" id="logsSkeleton" aria-hidden="true">
        <div class="logs-skeleton-row">
            <span class="logs-skeleton-line logs-skeleton-date"></span>
            <span class="logs-skeleton-pill"></span>
            <span class="logs-skeleton-line logs-skeleton-target"></span>
            <span class="logs-skeleton-line logs-skeleton-user"></span>
        </div>
        <div class="logs-skeleton-row">
            <span class="logs-skeleton-line logs-skeleton-date"></span>
            <span class="logs-skeleton-pill"></span>
            <span class="logs-skeleton-line logs-skeleton-target"></span>
            <span class="logs-skeleton-line logs-skeleton-user"></span>
        </div>
        <div class="logs-skeleton-row">
            <span class="logs-skeleton-line logs-skeleton-date"></span>
            <span class="logs-skeleton-pill"></span>
            <span class="logs-skeleton-line logs-skeleton-target"></span>
            <span class="logs-skeleton-line logs-skeleton-user"></span>
        </div>
        <div class="logs-skeleton-row">
            <span class="logs-skeleton-line logs-skeleton-date"></span>
            <span class="logs-skeleton-pill"></span>
            <span class="logs-skeleton-line logs-skeleton-target"></span>
            <span class="logs-skeleton-line logs-skeleton-user"></span>
        </div>
    </div>

    <!-- PAGINATION -->
    <div class="pagination-bar hidden" id="paginationBar">
        <button class="btn-page" id="prevPageBtn" disabled>
            <i class="fas fa-chevron-left"></i> Prev
        </button>
        <span class="page-info" id="pageInfo">Page 1</span>
        <button class="btn-page" id="nextPageBtn" disabled>
            Next <i class="fas fa-chevron-right"></i>
        </button>
    </div>
</main>
<!-- LOGOUT CONFIRMATION MODAL -->
<div id="logoutModalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99999;align-items:center;justify-content:center;padding:20px;">
    <div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:16px;padding:32px 28px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.2);animation:logoutModalPop 0.25s ease;">
        <div style="width:62px;height:62px;background:#fee2e2;border:1.5px solid #fca5a5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:22px;color:#dc2626;">
            <i class="fas fa-arrow-right-from-bracket"></i>
        </div>
        <h3 style="margin:0 0 10px;font-size:18px;font-weight:700;color:var(--text-main);">Sign out?</h3>
        <p style="margin:0 0 24px;font-size:14px;color:var(--text-secondary);line-height:1.6;">You'll be returned to the login screen. Any unsaved changes will be lost.</p>
        <div style="display:flex;gap:10px;">
            <button id="logoutCancelBtn" style="flex:1;padding:10px 16px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-body);color:var(--text-secondary);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;">Cancel</button>
            <button id="logoutConfirmBtn" style="flex:1;padding:10px 16px;border-radius:8px;border:none;background:#dc2626;color:#fff;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.2s;">
                <i class="fas fa-arrow-right-from-bracket"></i> Sign out
            </button>
        </div>
    </div>
</div>
<style>
@keyframes logoutModalPop {
    from { transform:scale(0.9);opacity:0; }
    to   { transform:scale(1);opacity:1; }
}
#logoutModalOverlay.show { display:flex !important; }
#logoutCancelBtn:hover { background:var(--hover-bg);color:var(--text-main); }
#logoutConfirmBtn:hover { background:#b91c1c; }
</style>


<script type="module" src="js/Activity_Logs.js"></script>

</body>
</html>
