<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Login</title>
    <link rel="stylesheet" href="css/Login.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
</head>

<body>

<div class="page-wrapper">
    <div class="auth-container">
        <div class="logo"><i class="fas fa-boxes-stacked"></i></div>
        <div class="title">S/N Variety</div>
        <div class="subtitle">Inventory Management System</div>
    </div>

    <div class="card">
        <div id="errorMessage" class="error"></div>

        <label>Email</label>
        <input type="email" id="email" placeholder="admin@inventory.com" required>

        <label>Password</label>
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter your password" required>
            <span class="toggle-btn" onclick="togglePassword('password', this)">
                <i class="fa-solid fa-eye"></i>
            </span>
        </div>

        <button class="login-btn" id="loginBtn" onclick="login()">
            <span id="loginBtnText">Sign In</span>
            <i class="fas fa-spinner fa-spin" id="loginSpinner" style="display:none;"></i>
        </button>

        <div class="links">
            <a href="Register.html">Create an account</a>
            <a href="Reset_Pass.html">Forgot password?</a>
        </div>
    </div>
</div>

<!-- SUCCESS MODAL -->
<div class="login-success-overlay" id="loginSuccessOverlay" style="display:none;">
    <div class="login-success-modal">
        <div class="login-success-icon">
            <i class="fas fa-check"></i>
        </div>
        <h2 class="login-success-title">Welcome back!</h2>
        <p class="login-success-sub">Login successful. Taking you to your dashboard...</p>
        <div class="login-progress-wrap">
            <div class="login-progress-bar" id="loginProgressBar"></div>
        </div>
    </div>
</div>

<script type="module" src="js/Login.js"></script>

</body>
</html>
