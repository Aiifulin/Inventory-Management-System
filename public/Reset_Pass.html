<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Inventory MS</title>
    <link rel="stylesheet" href="css/Reset.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
</head>
<body>

<div class="page-wrapper">
    <div class="auth-container">
        <div class="logo"><i class="fas fa-boxes-stacked"></i></div>
        <div class="title">Reset Password</div>
        <div class="subtitle">Enter your email to receive reset instructions</div>
    </div>

    <div class="card">
        <div id="error-box"   class="error"></div>
        <div id="success-box" class="success"></div>

        <form id="password-reset-form">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>

            <button class="reset-btn" id="resetBtn" type="submit">
                <span id="resetBtnText">Send Reset Link</span>
                <i class="fas fa-spinner fa-spin" id="resetSpinner" style="display:none;"></i>
            </button>
        </form>

        <div class="links">
            <a href="index.html"><i class="fas fa-arrow-left" style="font-size:11px;"></i> Back to Sign In</a>
        </div>
    </div>
</div>

<script type="module" src="js/Reset.js"></script>

</body>
</html>
