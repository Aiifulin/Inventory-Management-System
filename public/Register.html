<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Inventory MS</title>
    <link rel="stylesheet" href="css/Register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
</head>
<body>

<div class="page-wrapper">
    <div class="auth-container">
        <div class="logo"><i class="fas fa-boxes-stacked"></i></div>
        <div class="title">S/N Variety Inventory Management System</div>
        <div class="subtitle">Create an account to get started</div>
    </div>

    <div class="card">
        <div id="errorMessage" class="error"></div>

        <label>Full Name</label>
        <input type="text" id="name" placeholder="Juan Dela Cruz" required>

        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>

        <label>Password</label>
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="At least 6 characters" required>
            <span class="toggle-btn" onclick="togglePassword('password', this)">
                <i class="fa-solid fa-eye"></i>
            </span>
        </div>

        <label>Confirm Password</label>
        <div class="password-wrapper">
            <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
            <span class="toggle-btn" onclick="togglePassword('confirmPassword', this)">
                <i class="fa-solid fa-eye"></i>
            </span>
        </div>

        <button class="login-btn" id="registerBtn" onclick="register()">
            <span id="registerBtnText">Create Account</span>
            <i class="fas fa-spinner fa-spin" id="registerSpinner" style="display:none;"></i>
        </button>

        <div class="links">
            <a href="index.html">Already have an account? Sign In</a>
        </div>
    </div>
</div>

<!-- SUCCESS MODAL -->
<div class="login-success-overlay" id="successOverlay" style="display:none;">
    <div class="login-success-modal">
        <div class="login-success-icon">
            <i class="fas fa-check"></i>
        </div>
        <h2 class="login-success-title">Account Created!</h2>
        <p class="login-success-sub">Your account has been successfully created. Redirecting you to login...</p>
        <div class="login-progress-wrap">
            <div class="login-progress-bar" id="registerProgressBar"></div>
        </div>
    </div>
</div>

<script type="module" src="js/Register.js"></script>

</body>
</html>
